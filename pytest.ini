[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    -p no:warnings

markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require Docker)
    slow: Slow tests