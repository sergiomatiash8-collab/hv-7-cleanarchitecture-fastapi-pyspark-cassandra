version: '3.8'

networks:
  hv7_network:
    driver: bridge

services:
  cassandra:
    image: cassandra:4.1
    container_name: hv7-cassandra-dev
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_LISTEN_ADDRESS: cassandra
      CASSANDRA_SEEDS: cassandra
      CASSANDRA_CLUSTER_NAME: hv7-cluster
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT 1 FROM system.peers LIMIT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hv7_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hv7-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hv7_network
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: hv7-api-dev
    ports:
      - "8000:8000"
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      CASSANDRA_HOST: cassandra
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1
    volumes:
      - ../..:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - hv7_network
    restart: unless-stopped

volumes:
  cassandra_data:
  redis_data: